replicaCount: 2

image:
  repositor
  pullPolicy: IfNotPresent
  tag: "alpine"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP
  port: 80
  targetPort: 80

# Liveness probe — override path to /nonexistent to trigger CrashLoopBackOff demo
livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  failureThreshold: 3
  timeoutSeconds: 5

readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 3
  timeoutSeconds: 5

# Extra environment variables (name/value pairs)
env: []
# - name: CART_SERVICE_URL
#   value: "http://cart-service"

# Startup command override — set to ["sh", "-c", "exit 1"] for instant CrashLoopBackOff
command: []
args: []

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}

# Automatic rollback hook — triggered as a PostSync ArgoCD hook.
# If the deployment rollout does not become healthy within timeoutSeconds,
# the hook runs `kubectl rollout undo` and pins the ArgoCD Application back
# to the last known-good git revision so selfHeal does not re-apply the bad state.
rollback:
  enabled: true
  # Image with kubectl available
  image: bitnami/kubectl:latest
  # Seconds to wait for the rollout before declaring failure and rolling back
  timeoutSeconds: 360
