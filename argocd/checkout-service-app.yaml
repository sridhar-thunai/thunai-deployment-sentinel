apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: checkout-service
  namespace: argocd
  # Finalizer ensures ArgoCD deletes cluster resources when this Application is removed
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/sridhar-thunai/thunai-deployment-sentinel.git
    targetRevision: main
    path: charts/checkout-service
    helm:
      valueFiles:
        - values.yaml
      parameters:
        # Override autoscaling flag; HPA is managed externally on this cluster
        - name: autoscaling.enabled
          value: "true"

  destination:
    server: https://kubernetes.default.svc
    # Must match the namespace where the service actually runs
    namespace: checkout

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true
      - Validate=false
    retry:
      limit: 3
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m

  # Keep enough history for the rollback hook to find the previous good revision
  revisionHistoryLimit: 10
