apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: checkout-service
  namespace: argocd
  # Keep the Application alive when deleted from the cluster (removes orphan resources)
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/sridhar-thunai/thunai-deployment-sentinel.git
    targetRevision: agents/argocd-helm-chart-auto-upgrade
    path: helm/checkout-service

  destination:
    server: https://kubernetes.default.svc
    namespace: checkout

  syncPolicy:
    automated:
      prune: true        # remove resources deleted from the chart
      selfHeal: true     # re-sync if cluster state drifts from git
    syncOptions:
      - CreateNamespace=true   # auto-create the checkout namespace
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 2m
