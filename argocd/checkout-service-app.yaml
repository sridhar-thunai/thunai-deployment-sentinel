apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: checkout-service
  namespace: argocd
  # Finalizer ensures ArgoCD deletes cluster resources when this Application is removed
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/sridhar-thunai/thunai-deployment-sentinel
    targetRevision: main
    path: charts/checkout-service
    helm:
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: checkout-service

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m

  # Sentinel watches health here — keep revisionHistoryLimit > 0 for rollback
  revisionHistoryLimit: 5
